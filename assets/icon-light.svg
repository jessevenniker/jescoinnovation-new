<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 80 80"
     width="80" height="80"
     role="img"
     aria-label="Jesco Innovation icon">

  <!-- Outer precision ring -->
  <circle cx="40" cy="40" r="34"
          fill="none"
          stroke="#0F2A44"
          stroke-width="2"/>

  <!-- J: horizontal cap -->
  <line x1="40" y1="13" x2="54" y2="13"
        stroke="#0F2A44" stroke-width="3.8" stroke-linecap="round"/>

  <!-- J: vertical stroke -->
  <line x1="40" y1="13" x2="40" y2="50"
        stroke="#0F2A44" stroke-width="3.8" stroke-linecap="round"/>

  <!-- J: arc hook — turquoise -->
  <path d="M 40 50 A 16 16 0 0 1 24 66"
        fill="none"
        stroke="#19B5A5"
        stroke-width="3.8"
        stroke-linecap="round"/>

  <!-- Node: cap terminus -->
  <circle cx="54" cy="13" r="5.5" fill="#0F2A44"/>

  <!-- Node: hook terminus -->
  <circle cx="24" cy="66" r="5.5" fill="#19B5A5"/>

</svg>
