<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 300 68"
     width="300" height="68"
     role="img"
     aria-label="Jesco Innovation logo">

  <defs>
    <style>
      .ji { font-family: 'Helvetica Neue', 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Outer precision ring -->
  <circle cx="34" cy="34" r="30"
          fill="none"
          stroke="#F4EDE0"
          stroke-width="1.8"/>

  <!-- J: horizontal cap -->
  <line x1="34" y1="12" x2="46" y2="12"
        stroke="#F4EDE0" stroke-width="3.2" stroke-linecap="round"/>

  <!-- J: vertical stroke -->
  <line x1="34" y1="12" x2="34" y2="44"
        stroke="#F4EDE0" stroke-width="3.2" stroke-linecap="round"/>

  <!-- J: arc hook — turquoise -->
  <path d="M 34 44 A 14 14 0 0 1 20 58"
        fill="none"
        stroke="#3FC4B2"
        stroke-width="3.2"
        stroke-linecap="round"/>

  <!-- Node: cap terminus -->
  <circle cx="46" cy="12" r="4.5" fill="#F4EDE0"/>

  <!-- Node: hook terminus -->
  <circle cx="20" cy="58" r="4.5" fill="#3FC4B2"/>

  <!-- Separator -->
  <line x1="78" y1="19" x2="78" y2="49"
        stroke="#F4EDE0" stroke-width="1" opacity="0.2"/>

  <!-- "Jesco" wordmark -->
  <text x="88" y="35"
        class="ji"
        font-size="28"
        font-weight="700"
        fill="#F4EDE0"
        letter-spacing="0.8">Jesco</text>

  <!-- "INNOVATION" descriptor -->
  <text x="89.5" y="53"
        class="ji"
        font-size="10.5"
        font-weight="600"
        fill="#3FC4B2"
        letter-spacing="5">INNOVATION</text>

</svg>
